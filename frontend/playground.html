<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rustphy Playground v2</title>
    <style>
        /* Cache buster: v2.0 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: #252526;
            padding: 15px 20px;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 20px;
            color: #cccccc;
            font-weight: normal;
        }

        .version {
            color: #858585;
            font-size: 12px;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .top-panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
            border-right: 1px solid #3e3e42;
            min-height: 0;
        }

        .panel:last-child {
            border-right: none;
        }

        .panel-header {
            background: #252526;
            padding: 10px 15px;
            border-bottom: 1px solid #3e3e42;
            font-size: 13px;
            color: #cccccc;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-content {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        #editor {
            width: 100%;
            height: 100%;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 15px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        #output {
            padding: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 13px;
            line-height: 1.6;
            color: #d4d4d4;
        }

        .button-group {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #252526;
            border-top: 1px solid #3e3e42;
            flex-shrink: 0;
            min-height: 60px;
        }

        button {
            padding: 8px 16px;
            background: #0e639c;
            color: #ffffff;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: background 0.2s;
        }

        button:hover {
            background: #1177bb;
        }

        button:active {
            background: #0d5a8f;
        }

        button:disabled {
            background: #3e3e42;
            color: #858585;
            cursor: not-allowed;
        }

        button.run-btn {
            background: #16825d;
        }

        button.run-btn:hover {
            background: #1a9d6f;
        }

        button.run-btn:active {
            background: #14704f;
        }

        .console {
            background: #252526;
            border-top: 1px solid #3e3e42;
            height: 200px;
            display: flex;
            flex-direction: column;
        }

        .console-header {
            background: #1e1e1e;
            padding: 8px 15px;
            border-bottom: 1px solid #3e3e42;
            font-size: 12px;
            color: #cccccc;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .console-content {
            flex: 1;
            padding: 10px 15px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.5;
        }

        .console-line {
            margin-bottom: 4px;
        }

        .console-line.error {
            color: #f48771;
        }

        .console-line.success {
            color: #89d185;
        }

        .console-line.info {
            color: #75beff;
        }

        .clear-btn {
            background: transparent;
            color: #cccccc;
            padding: 4px 10px;
            font-size: 11px;
        }

        .clear-btn:hover {
            background: #3e3e42;
        }

        .status {
            display: inline-block;
            margin-left: 10px;
            padding: 2px 8px;
            background: #3e3e42;
            border-radius: 2px;
            font-size: 11px;
        }

        .status.ready {
            background: #16825d;
            color: #fff;
        }

        .loading {
            color: #858585;
            font-style: italic;
        }
    </style>
</head>
<body>
    <header>
        <h1>🦀 Rustphy Playground</h1>
        <div class="version" id="version">Loading...</div>
    </header>

    <div class="main-container">
        <div class="top-panels">
            <!-- Left Panel: Editor -->
            <div class="panel">
                <div class="panel-header">
                    Goophy Code
                    <span class="status" id="editor-status"></span>
                </div>
                <div class="panel-content">
                    <textarea id="editor" spellcheck="false">let x = 10;
let y = 20;
let result = x + y;
print(result);

func greet(name) {
    return "Hello, " + name;
};

print(greet("World"));</textarea>
                </div>
                <div class="button-group">
                    <button id="compile-bytecode-btn">Compile to Bytecode</button>
                    <button id="compile-wasm-btn">Compile to WASM</button>
                    <button id="run-btn" class="run-btn" style="display: none;">▶ Run Bytecode</button>
                </div>
            </div>

            <!-- Right Panel: Output -->
            <div class="panel">
                <div class="panel-header">
                    Output
                    <span class="status" id="output-status"></span>
                </div>
                <div class="panel-content">
                    <div id="output">Click a button to compile...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Console at Bottom -->
    <div class="console">
        <div class="console-header">
            Console
            <button class="clear-btn" onclick="clearConsole()">Clear</button>
        </div>
        <div class="console-content" id="console"></div>
    </div>

    <script type="module">
        import init, {
            compile_to_wasm,
            compile_to_bytecode,
            run_rustphy_code,
            version
        } from './pkg/rustphy.js';

        let wasmReady = false;
        let compiledBytecode = null;

        // Initialize WASM
        async function initializeWasm() {
            try {
                await init();
                wasmReady = true;
                logConsole('✓ Rustphy compiler loaded successfully', 'success');
                document.getElementById('version').textContent = `v${version()}`;
                document.getElementById('editor-status').textContent = 'Ready';
                document.getElementById('editor-status').classList.add('ready');
            } catch (e) {
                console.error('Failed to initialize WASM:', e);
                logConsole('✗ Failed to load WASM: ' + e, 'error');
                document.getElementById('version').textContent = 'Error loading';
            }
        }

        // Console logging
        function logConsole(message, type = 'info') {
            const console = document.getElementById('console');
            const line = document.createElement('div');
            line.className = `console-line ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            line.textContent = `[${timestamp}] ${message}`;
            console.appendChild(line);
            console.scrollTop = console.scrollHeight;
        }

        function clearConsole() {
            document.getElementById('console').innerHTML = '';
        }

        // Compile to Bytecode
        window.compileToBytecode = function() {
            if (!wasmReady) {
                logConsole('Compiler not ready yet', 'error');
                return;
            }

            const code = document.getElementById('editor').value;
            const output = document.getElementById('output');

            try {
                logConsole('Compiling to bytecode...', 'info');
                const bytecode = compile_to_bytecode(code);
                output.textContent = bytecode;
                compiledBytecode = code; // Store for later execution
                document.getElementById('run-btn').style.display = 'block';
                document.getElementById('output-status').textContent = 'Bytecode';
                logConsole('✓ Compiled to bytecode successfully', 'success');
            } catch (e) {
                output.textContent = `Error: ${e}`;
                logConsole('✗ Compilation error: ' + e, 'error');
                document.getElementById('run-btn').style.display = 'none';
            }
        };

        // Compile to WASM
        window.compileToWasm = function() {
            if (!wasmReady) {
                logConsole('Compiler not ready yet', 'error');
                return;
            }

            const code = document.getElementById('editor').value;
            const output = document.getElementById('output');

            try {
                logConsole('Compiling to WASM...', 'info');
                const wat = compile_to_wasm(code);
                output.textContent = wat;
                document.getElementById('run-btn').style.display = 'none';
                document.getElementById('output-status').textContent = 'WAT';
                logConsole('✓ Compiled to WAT successfully', 'success');
            } catch (e) {
                output.textContent = `Error: ${e}`;
                logConsole('✗ Compilation error: ' + e, 'error');
            }
        };

        // Run Bytecode
        window.runBytecode = function() {
            if (!compiledBytecode) {
                logConsole('No bytecode to run', 'error');
                return;
            }

            try {
                logConsole('Running bytecode...', 'info');
                const result = run_rustphy_code(compiledBytecode);

                // Display each output line in the console
                if (result && result.trim()) {
                    const lines = result.split('\n');
                    lines.forEach(line => {
                        logConsole(line, 'success');
                    });
                }

                logConsole('✓ Execution completed', 'success');
                document.getElementById('output').textContent += '\n\n--- Execution Result ---\n' + result;
            } catch (e) {
                logConsole('✗ Runtime error: ' + e, 'error');
            }
        };

        // Event listeners
        document.getElementById('compile-bytecode-btn').addEventListener('click', compileToBytecode);
        document.getElementById('compile-wasm-btn').addEventListener('click', compileToWasm);
        document.getElementById('run-btn').addEventListener('click', runBytecode);

        // Initialize on load
        initializeWasm();
    </script>
</body>
</html>
